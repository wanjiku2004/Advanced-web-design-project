<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kikapu Mart Form Validation System</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}
.form-group {
    margin-bottom: 20px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}
input {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s;
}
input:focus {
    outline: none;
    border-color: #007bff;
}
.error {
    color: #dc3545;
    font-size: 14px;
    margin-top: 5px;
    display: none;
}
.success {
    color: #28a745;
}
button {
    padding: 14px 32px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #0056b3;
}
.valid {
    border-color: #28a745;
}
</style>
</head>
<body>

<h1>Kikapu Mart Form Validation System</h1>

<form id="myForm">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullname" placeholder="Your Name" required>
<div class="error" id="fullnameError"></div>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email" placeholder="yourname@example.com" required>
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="••••••••" required>
<div class="error" id="passwordError"></div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="••••••••" required>
<div class="error" id="confirmPasswordError"></div>
</div>

<button type="submit">Submit Form</button>
</form>

<script>
// ==================== FORM VALIDATION SYSTEM ====================

const form = document.getElementById('myForm');

// Get all inputs
const fullname = document.getElementById('fullname');
const email = document.getElementById('email');
const password = document.getElementById('password');
const confirmPassword = document.getElementById('confirmPassword');

// Error elements
const fullnameError = document.getElementById('fullnameError');
const emailError = document.getElementById('emailError');
const passwordError = document.getElementById('passwordError');
const confirmPasswordError = document.getElementById('confirmPasswordError');

// Validation functions
function validateFullName() {
    if (fullname.value.trim().length < 3) {
        showError(fullname, fullnameError, "Full name must be at least 3 characters");
        return false;
    }
    clearError(fullname, fullnameError);
    return true;
}

function validateEmail() {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.value)) {
        showError(email, emailError, "Please enter a valid email address");
        return false;
    }
    clearError(email, emailError);
    return true;
}

function validatePassword() {
    const pass = password.value;
    if (pass.length < 8) {
        showError(password, passwordError, "Password must be at least 8 characters");
        return false;
    }
    if (!/[A-Z]/.test(pass)) {
        showError(password, passwordError, "Password must contain at least one uppercase letter");
        return false;
    }
    if (!/[0-9]/.test(pass)) {
        showError(password, passwordError, "Password must contain at least one number");
        return false;
    }
    clearError(password, passwordError);
    return true;
}

function validateConfirmPassword() {
    if (password.value !== confirmPassword.value) {
        showError(confirmPassword, confirmPasswordError, "Passwords do not match");
        return false;
    }
    clearError(confirmPassword, confirmPasswordError);
    return true;
}

// Helper functions
function showError(input, errorElement, message) {
    input.classList.remove('valid');
    input.classList.add('error-input'); // You can style this
    errorElement.textContent = message;
    errorElement.style.display = 'block';
}

function clearError(input, errorElement) {
    input.classList.add('valid');
    errorElement.textContent = '';
    errorElement.style.display = 'none';
}

// Real-time validation
fullname.addEventListener('input', validateFullName);
email.addEventListener('input', validateEmail);
password.addEventListener('input', () => {
    validatePassword();
    if (confirmPassword.value) validateConfirmPassword();
});
confirmPassword.addEventListener('input', validateConfirmPassword);

// Form submission
form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const isFullNameValid = validateFullName();
    const isEmailValid = validateEmail();
    const isPasswordValid = validatePassword();
    const isConfirmValid = validateConfirmPassword();
    
    if (isFullNameValid && isEmailValid && isPasswordValid && isConfirmValid) {
        alert('🎉 Form submitted successfully!');
        console.log('Form Data:', {
            fullname: fullname.value,
            email: email.value,
            password: password.value
        });
        
        // Optional: Reset form
        // form.reset();
    }
});
</script>

</body>
</html>
